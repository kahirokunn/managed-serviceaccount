{{ if eq .InstallMode "Hosted" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: managed-serviceaccount-kubeconfig-provisioner-source
  namespace: {{ .ExternalManagedKubeConfigNamespace }}
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: hosting
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["{{ .ExternalManagedKubeConfigSecret }}"]
  verbs: ["get"]
{{ end }}
