apiVersion: apps/v1
kind: Deployment
metadata:
  name: managed-serviceaccount-addon-agent
  namespace: {{ .AddonInstallNamespace }}
{{- if eq .InstallMode "Hosted" }}
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: hosting
{{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      addon-agent: managed-serviceaccount
  template:
    metadata:
      labels:
        addon-agent: managed-serviceaccount
    spec:
      serviceAccountName: managed-serviceaccount
{{- if .NodeSelector }}
      nodeSelector:
      {{- range $key, $value := .NodeSelector }}
        "{{ $key }}": "{{ $value }}"
      {{- end }}
{{- end }}
{{- if .Tolerations }}
      tolerations:
      {{- range $toleration := .Tolerations }}
      - key: "{{ $toleration.Key }}"
        value: "{{ $toleration.Value }}"
        effect: "{{ $toleration.Effect }}"
        operator: "{{ $toleration.Operator }}"
        {{- if $toleration.TolerationSeconds }}
        tolerationSeconds: {{ $toleration.TolerationSeconds }}
        {{- end }}
      {{- end }}
{{- end }}
      containers:
        - name: addon-agent
          image: {{ .Image }}
          imagePullPolicy: IfNotPresent
          command:
            - /msa
            - agent
          args:
            - --leader-elect=false
            - --cluster-name={{ .ClusterName }}
            - --kubeconfig=/etc/hub/kubeconfig
{{- if eq .InstallMode "Hosted" }}
            - --spoke-kubeconfig=/etc/managed/kubeconfig
{{- end }}
            - --lease-health-check=true
          volumeMounts:
            - name: hub-kubeconfig
              mountPath: /etc/hub/
              readOnly: true
{{- if eq .InstallMode "Hosted" }}
            - name: managed-kubeconfig
              mountPath: /etc/managed/
              readOnly: true
{{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: hub-kubeconfig
          secret:
            secretName: {{ .HubKubeConfigSecret }}
{{- if eq .InstallMode "Hosted" }}
        - name: managed-kubeconfig
          secret:
            secretName: {{ .ManagedKubeConfigSecret }}
{{- end }}
{{ if .ImagePullSecretData }}
      imagePullSecrets:
      - name: open-cluster-management-image-pull-credentials
{{- end }}
