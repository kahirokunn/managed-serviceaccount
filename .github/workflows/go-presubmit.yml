name: Go

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - release-*
  pull_request:
    branches:
      - main
      - release-*

env:
  # Common versions
  GO_VERSION: '1.25'
  GO_REQUIRED_MIN_VERSION: ''

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: build
        run: make build

  images-cp-creds:
    name: images-cp-creds
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: pull base image
        run: docker pull registry.access.redhat.com/ubi9/ubi-minimal:latest --platform=linux/amd64
      - name: images-cp-creds
        run: |
          IMAGE_BUILD_EXTRA_FLAGS="--platform linux/amd64 --build-arg OS=linux --build-arg ARCH=amd64" \
            make images-cp-creds

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: unit
        run: make test
      - name: report coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_UPLOAD_TOKEN }}
          files: ./cover.out
          flags: unit
          name: unit
          verbose: true
          fail_ci_if_error: false

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: integration
        run: make test-integration

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install clusteradm
        run: curl -L https://raw.githubusercontent.com/open-cluster-management-io/clusteradm/main/install.sh | bash
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.14.0
      - name: Prepare OCM testing environment
        run: |
          clusteradm init --output-join-command-file join.sh --wait
          sh -c "$(cat join.sh) loopback --force-internal-endpoint-lookup"
          clusteradm accept --clusters loopback --wait 30
          kubectl wait --for=condition=ManagedClusterConditionAvailable managedcluster/loopback
      - name: Build image
        run: |
          make images
          kind load docker-image quay.io/open-cluster-management/managed-serviceaccount:latest --name chart-testing
      - name: Install latest managed-serviceaccount
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/cluster-inventory-api/refs/heads/main/config/crd/bases/multicluster.x-k8s.io_clusterprofiles.yaml
          helm install \
             -n open-cluster-management-addon --create-namespace \
             managed-serviceaccount charts/managed-serviceaccount/ \
             --set tag=latest \
             --set featureGates.ephemeralIdentity=true \
             --set featureGates.clusterProfile=true
      - name: Run e2e test
        run: make test-e2e GENKGO_ARGS='--ginkgo.label-filter='\''!template-install'\'''

  e2e-addon-template:
    name: e2e-addon-template
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install clusteradm
        run: curl -L https://raw.githubusercontent.com/open-cluster-management-io/clusteradm/main/install.sh | bash
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1.14.0
      - name: Prepare OCM testing environment
        run: |
          clusteradm init --output-join-command-file join.sh --wait
          sh -c "$(cat join.sh) loopback --force-internal-endpoint-lookup"
          clusteradm accept --clusters loopback --wait 30
          kubectl wait --for=condition=ManagedClusterConditionAvailable managedcluster/loopback
      - name: Build image
        run: |
          make images
          kind load docker-image quay.io/open-cluster-management/managed-serviceaccount:latest --name chart-testing
      - name: Install latest managed-serviceaccount
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/cluster-inventory-api/refs/heads/main/config/crd/bases/multicluster.x-k8s.io_clusterprofiles.yaml
          helm install \
            -n open-cluster-management-addon --create-namespace \
            managed-serviceaccount charts/managed-serviceaccount/ \
            --set tag=latest \
            --set featureGates.ephemeralIdentity=true \
            --set featureGates.clusterProfile=true \
            --set hubDeployMode=AddOnTemplate \
            --set targetCluster=loopback
      - name: Run e2e test
        run: |
          make test-e2e GENKGO_ARGS='--ginkgo.label-filter='\''!ephemeral&&!install'\'''
          # run ephemeral tests after non-ephemeral and non-install tests to wait for the addon agent to be steady
          make test-e2e GENKGO_ARGS='--ginkgo.label-filter=ephemeral'
          # run install tests after non-ephemeral tests since it may cause the addon agent to be restarted
          make test-e2e GENKGO_ARGS='--ginkgo.label-filter=install'

  e2e-hosted:
    name: e2e-hosted
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install clusteradm
        run: curl -L https://raw.githubusercontent.com/open-cluster-management-io/clusteradm/main/install.sh | bash
      - name: Create hub kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: hub
      - name: Create spoke kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: spoke
      - name: Create hosting kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: hosting
      - name: Resolve kind container DNS on the runner
        run: |
          # the --internal kubeconfigs point at <cluster>-control-plane:6443 (a cert SAN),
          # so map each kind control-plane IP into /etc/hosts for the runner to resolve
          for c in hub spoke hosting; do
            ip=$(docker inspect -f '{{(index .NetworkSettings.Networks "kind").IPAddress}}' "${c}-control-plane")
            echo "$ip ${c}-control-plane" | sudo tee -a /etc/hosts
          done
      - name: Export internal kubeconfigs
        run: |
          mkdir -p kubeconfigs
          kind get kubeconfig --name hub     --internal > kubeconfigs/hub.kubeconfig
          kind get kubeconfig --name spoke   --internal > kubeconfigs/spoke.kubeconfig
          kind get kubeconfig --name hosting --internal > kubeconfigs/hosting.kubeconfig
      - name: Register spoke and hosting clusters with the hub
        run: |
          export KUBECONFIG=$PWD/kubeconfigs/hub.kubeconfig
          clusteradm init --output-join-command-file join.sh --wait
          KUBECONFIG=$PWD/kubeconfigs/spoke.kubeconfig   sh -c "$(cat join.sh) spoke   --force-internal-endpoint-lookup"
          KUBECONFIG=$PWD/kubeconfigs/hosting.kubeconfig sh -c "$(cat join.sh) hosting --force-internal-endpoint-lookup"
          clusteradm accept --clusters spoke,hosting --wait 30
          kubectl wait --for=condition=ManagedClusterConditionAvailable managedcluster/spoke   --timeout=2m
          kubectl wait --for=condition=ManagedClusterConditionAvailable managedcluster/hosting --timeout=2m
      - name: Block hosted addon workloads from scheduling on the spoke
        run: |
          # taint the spoke so any accidental hosted workload placement stays Pending and fails the run
          kubectl --kubeconfig=$PWD/kubeconfigs/spoke.kubeconfig wait --for=condition=Ready nodes --all --timeout=2m
          kubectl --kubeconfig=$PWD/kubeconfigs/spoke.kubeconfig taint nodes --all \
            hosted-e2e.open-cluster-management.io/no-addon-workloads=true:NoSchedule --overwrite
      - name: Build image and load into hub + hosting
        run: |
          make images
          kind load docker-image quay.io/open-cluster-management/managed-serviceaccount:latest --name hub
          kind load docker-image quay.io/open-cluster-management/managed-serviceaccount:latest --name hosting
      - name: Install managed-serviceaccount on the hub
        run: |
          # keep the default hubDeployMode=Deployment so the hosted-mode templates are rendered
          export KUBECONFIG=$PWD/kubeconfigs/hub.kubeconfig
          helm install \
            -n open-cluster-management-addon --create-namespace \
            managed-serviceaccount charts/managed-serviceaccount/ \
            --set tag=latest \
            --set featureGates.ephemeralIdentity=true
      - name: Run hosted-mode e2e
        run: |
          # exclude suites covered by the single-cluster jobs above (template-install, ephemeral, clusterprofile)
          make test-e2e-hosted \
            E2E_TEST_CLUSTER_NAME=spoke \
            HUB_KUBECONFIG=$PWD/kubeconfigs/hub.kubeconfig \
            SPOKE_KUBECONFIG=$PWD/kubeconfigs/spoke.kubeconfig \
            AGENT_KUBECONFIG=$PWD/kubeconfigs/hosting.kubeconfig \
            HOSTING_CLUSTER_NAME=hosting \
            HOSTED_INSTALL_NAMESPACE=klusterlet-spoke \
            GENKGO_ARGS='--ginkgo.label-filter='\''!template-install&&!ephemeral&&!clusterprofile'\'''
      - name: Assert no hosted addon workload pods are on the spoke
        run: |
          pods=$(kubectl --kubeconfig=$PWD/kubeconfigs/spoke.kubeconfig get pods -A \
            -l 'addon-agent in (managed-serviceaccount,managed-serviceaccount-kubeconfig-provisioner)' \
            -o jsonpath='{range .items[*]}{.metadata.namespace}/{.metadata.name}{"\n"}{end}')
          if [ -n "$pods" ]; then
            echo "hosted addon workload pods were scheduled on the managed/spoke cluster:" >&2
            echo "$pods" >&2
            exit 1
          fi
